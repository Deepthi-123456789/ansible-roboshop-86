- name : mongodb setup
  hosts : mongodb
  become : yes
  tasks :
   - name : copy mongodb repo file
     ansible.builtin.copy:
      src : mongodb.repo
      dect : /etc/yum.repos.d/mongo.repo

   - name : install mogodb
     ansible.builtin.package:
      name : mongodb-org
      state : present

   - name : allow remote connection
     ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

   - name : start and enable mongodb
     ansible.builtin.service:
      name : mpngodb
      state : started
      enabled : yes