- name : setup shipping server
  hosts : shipping
  become : yes
  tasks :
   - name : install maven
     ansible.builtin.package:
      name : "{{ item }}"
      state : present
     loop :
      - maven
      - mysql
   - name : install mysql libraries
     ansible.builtin.pip:
      exexcutable : pip3.9
      name : "{{ item }}"
     loop :
      - pymysql
      - cryptography

   - name: create roboshop system shipping
     ansible.builtin.shipping:
      name: roboshop
      comment: RoboShop System shipping
      system: true
      shell: /sbin/nologin
      home: /app

   - name : remove the app directory if exists
     ansible.builtin.file:
      path : /app
      state : absent

   - name : create app directory
     ansible.builtin.file:
      path : /app
      state : directory

   - name : delete the shipping.zip file
     ansible.builtin.file:
       path : /tmp/shipping.zip
       state : absent
    
   - name : download the shipping code
     ansible.builtin.get_url:
      src :  https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest : /tmp/shipping.zip

   - name : unzip shipping code
     ansible.builtin.unarchive:
        src : /tmp/shipping.zip
        dest : /app
        remote_src : yes

   - name : install the dependencies
     ansible.builtin.command: mvn clean package

   - name : move jar file
     ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar 
     args :
      chdir : /app
  

   - name : copy  shippingservice file
     ansible .builtin.copy:
       src : shipping.service
       dest : /etc/systemd/system/shipping.service

    
   - name: import shipping data into mysql
     community.mysql.mysql_db:
      state: import
      name: all
      login_host: mysql.sitaram.icu
      login_user: root
      login_password: RoboShop@1
      target: "{{ item }}"
     loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql 
      - /app/db/master-data.sql

   - name : demon reload start and enable shipping
     ansible.builtin.systemd_service:
      name : shipping 
      enabled : yes
      state : started
      daemon_reload : yes

   