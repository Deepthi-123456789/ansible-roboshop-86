- name : setup user service
  hosts : user
  become : yes
  tasks:
   - name : disable default nodejs
     ansible.builtin.command: dnf module disable nodejs -y

   - name : enable nodejs 20
     ansible.builtin.command: dnf module enable nodejs:20 -y
    
   - name : insatll nodejs
     ansible.builtin.package:
      name : nodejs
      state : present

   - name: create roboshop system user
     ansible.builtin.user:
      name: roboshop
      comment: RoboShop System user
      system: true
      shell: /sbin/nologin
      home: /app

   - name : remove the app directory if exists
     ansible.builtin.file:
      path : /app
      state : absent

   - name : create app directory
     ansible.builtin.file:
      path : /app
      state : directory

   - name : delete the user.zip file
     ansible.builtin.file:
       path : /tmp/user.zip
       state : absent
    
   - name : download the user code
     ansible.builtin.get_url:
      src :  https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest : /tmp/user.zip

   - name : unzip user code
     ansible.builtin.unarchive:
        src : /tmp/user.zip
        dest : /app
        remote_src : yes

   - name: install dependencies
     community.general.npm:
      path: /app

   - name : copy user service file
     ansible.builtin.copy:
      src : user.service
      dest : /etc/systemd/system/user.service

  
   - name : demon reload start and enable user
     ansible.builtin.systemd_service:
      name : user
      enabled : yes
      state : started
      daemon_reload : yes

   
  
      

    