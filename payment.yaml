- name : setup payment server
  hosts : payment
  become : yes
  tasks :
   - name : install python packages
     ansible.builtin.package:
      name : "{{item}}"
      state : present
     loop :
      - python3
      - gcc
      - python3-devel
  
   
   - name: create roboshop system user
     ansible.builtin.user:
      name: roboshop
      comment: RoboShop System user
      system: true
      shell: /sbin/nologin
      home: /app
      
   - name : remove app directory if exixts
     ansible.builtin.file:
      state : absent
      path : /app

   - name : create app directory
     ansible.builtin.file:
      state : directory
      path : /app

   - name : Delete calatologue file
     ansible.builtin.file:
      path : /tmp/payment.zip
      state : absent

   - name : download payment code
     ansible.builtin.get_url:
        url :  https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
        dest : /tmp/payment.zip

   - name : unzip payment code
     ansible.builtin.unarchive:
        src : /tmp/payment.zip
        dest : /app
        remote_src : yes

   - name: install dependencies
     ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
     args:
      chdir: /app

   - name: copy payment service
     ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

   - name: daemon reload enable and start
     ansible.builtin.systemd_service:
      name: payment
      enabled: true
      state: started
      daemon_reload: true