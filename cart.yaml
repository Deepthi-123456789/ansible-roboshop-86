- name : setup cart service
  hosts : cart
  become : yes
  tasks:
   - name : disable default nodejs
     ansible.builtin.command: dnf module disable nodejs -y

   - name : enable nodejs 20
     ansible.builtin.command: dnf module enable nodejs:20 -y
    
   - name : insatll nodejs
     ansible.builtin.package:
      name : nodejs
      state : present

   - name: create roboshop system cart
     ansible.builtin.user:
      name: roboshop
      comment: RoboShop System cart
      system: true
      shell: /sbin/nologin
      home: /app

   - name : remove the app directory if exists
     ansible.builtin.file:
      path : /app
      state : absent

   - name : create app directory
     ansible.builtin.file:
      path : /app
      state : directory

   - name : delete the cart.zip file
     ansible.builtin.file:
       path : /tmp/cart.zip
       state : absent
    
   - name : download the cart code
     ansible.builtin.get_url:
      url :  https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest : /tmp/cart.zip

   - name : unzip cart code
     ansible.builtin.unarchive:
        src : /tmp/cart.zip
        dest : /app
        remote_src : yes

   - name: install dependencies
     community.general.npm:
      path: /app

   - name : copy cart service file
     ansible.builtin.copy:
      src : cart.service
      dest : /etc/systemd/system/cart.service

  
   - name : demon reload start and enable cart
     ansible.builtin.systemd_service:
      name : cart
      enabled : yes
      state : started
      daemon_reload : yes

   
  
      

    